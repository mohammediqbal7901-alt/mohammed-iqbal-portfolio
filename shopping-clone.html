<!DOCTYPE html>
<html>
<head>
    <title>Myntra Clone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <h1>Shopping Clone</h1>
<p>
    <strong>Cart Items:</strong>
    <span id="cartCount">0</span>
</p>

<button class="btn btn-success mb-3" onclick="viewCart()">
    View Cart
</button>

<div id="cartSection" class="card p-3 mb-3" style="display:none;">
    <h3>My Cart</h3>

    <ul id="cartItems">
    </ul>
</div>    <div class="card p-4">

        <h3>Men's T-Shirt</h3>

        <p>Price: ₹799</p>

       <button class="btn btn-primary" onclick="addToCart()">
    Add to Cart
</button>
    </div>


<br>

 <div class="card p-4">

        <h3>Men's pant</h3>

        <p>Price: ₹1499</p>

       <button class="btn btn-primary" onclick="addToCart()">
    Add to Cart
</button>


    </div>
<br>

 <div class="card p-4">

        <h3>Maxi Dress women</h3>

        <p>Price: ₹899</p>

       <button class="btn btn-primary" onclick="addToCart()">
    Add to Cart
</button>


    </div>
<br>

 <div class="card p-4">

        <h3>Off-Shoulder Dress women</h3>

        <p>Price: ₹1899</p>

       <button class="btn btn-primary" onclick="addToCart()">
    Add to Cart
</button>


    </div>




</div>
<script>

let cart = 0;

function addToCart() {

    cart++;

    document.getElementById("cartCount").innerText = cart;

    let item = document.createElement("li");

    item.innerText = "Men's T-Shirt - ₹799";

    document.getElementById("cartItems").appendChild(item);

    alert("Product added to cart!");
}

function viewCart() {

    let cartSection = document.getElementById("cartSection");

    if (cartSection.style.display === "none") {

        cartSection.style.display = "block";

    } else {

        cartSection.style.display = "none";

    }
}
</script></body>
</html>
